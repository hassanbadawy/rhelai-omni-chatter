apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/accelerator-name: ""
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: ""
    opendatahub.io/template-display-name: vLLM CPU Generic Runtime
    opendatahub.io/template-name: vllm-cpu-generic
    openshift.io/display-name: vLLM CPU Generic Runtime
  labels:
    opendatahub.io/dashboard: "true"
  name: vllm-cpu-generic
spec:
  builtInAdapter:
    modelLoadingTimeoutMillis: 300000
  containers:
    - args:
        - --model
        - /mnt/models
        - --port
        - "8080"
        - --device
        - cpu
        - --trust-remote-code
        - --max-model-len
        - "2048"
      image: quay.io/rh-aiservices-bu/vllm-cpu-openai-ubi9:0.3
      name: kserve-container
      ports:
        - containerPort: 8080
          name: http1
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
