---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashy
  namespace: langflow
  labels:
    app: dashy
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: nodejs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashy
  template:
    metadata:
      labels:
        app: dashy
    spec:
      serviceAccountName: dashy-sa
      containers:
        - name: dashy
          image: docker.io/lissy93/dashy:latest
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /app/user-data/conf.yml
              subPath: conf.yml
      volumes:
        - name: config
          configMap:
            name: dashy-config
---
apiVersion: v1
kind: Service
metadata:
  name: dashy
  namespace: langflow
  labels:
    app: dashy
spec:
  selector:
    app: dashy
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dashy
  namespace: langflow
  labels:
    app: dashy
spec:
  to:
    kind: Service
    name: dashy
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
