# =============================================================================
# CHANGE THESE VALUES TO MATCH YOUR CLUSTER
# Then find-and-replace the old values throughout this file:
#   1. NAMESPACE:      langflow  (appears as namespace: langflow)
#   2. CLUSTER_DOMAIN: cluster-5t99k.5t99k.sandbox1248.opentlc.com
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: langflow
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-config
  namespace: langflow
data:
  CLUSTER_DOMAIN: cluster-5t99k.5t99k.sandbox1248.opentlc.com
  NAMESPACE: langflow
---
# =============================================================================
# Langflow - Visual LLM flow builder (port 7860)
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langflow-data
  namespace: langflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langflow
  namespace: langflow
  labels:
    app: langflow
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langflow
  template:
    metadata:
      labels:
        app: langflow
    spec:
      containers:
        - name: langflow
          image: langflowai/langflow:latest
          ports:
            - containerPort: 7860
              name: http
          env:
            - name: LANGFLOW_HOST
              value: "0.0.0.0"
            - name: LANGFLOW_PORT
              value: "7860"
            - name: HOME
              value: "/app/data"
            - name: LANGFLOW_CONFIG_DIR
              value: "/app/data/.langflow"
            - name: LANGFLOW_DATABASE_URL
              value: "sqlite:////app/data/langflow.db"
            - name: LANGFLOW_ALEMBIC_LOG_FILE
              value: "/app/data/alembic.log"
            - name: LANGFLOW_AUTO_LOGIN
              value: "true"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /.cache
          startupProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7860
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langflow-data
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: langflow
  namespace: langflow
  labels:
    app: langflow
spec:
  type: ClusterIP
  selector:
    app: langflow
  ports:
    - port: 7860
      targetPort: 7860
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: langflow
  namespace: langflow
  labels:
    app: langflow
spec:
  to:
    kind: Service
    name: langflow
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
# =============================================================================
# Llama Stack - RHOAI Operator (rh-dev + ConfigMap with SQLite storage)
# Following the Red Hat lab pattern to avoid PostgreSQL dependency.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-config
  namespace: langflow
  labels:
    llamastack.io/distribution: llama-stack
    opendatahub.io/dashboard: "true"
data:
  config.yaml: |
    version: "2"
    image_name: rh
    apis:
    - agents
    - datasetio
    - eval
    - files
    - inference
    - safety
    - scoring
    - tool_runtime
    - vector_io
    providers:
      inference:
      - provider_id: sentence-transformers
        provider_type: inline::sentence-transformers
        config: {}
      - provider_id: vllm
        provider_type: remote::vllm
        config:
          base_url: http://llama-32-predictor.ai501.svc.cluster.local:8080/v1
          api_token: fake
          tls_verify: false
          max_tokens: 4096
      vector_io:
      - provider_id: milvus
        provider_type: inline::milvus
        config:
          db_path: /opt/app-root/src/.llama/distributions/rh/milvus.db
          kvstore:
            backend: default
            namespace: "milvus"
          persistence:
            backend: default
            namespace: "milvus_persistence"
      agents:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          persistence:
            agent_state:
              backend: default
              namespace: "agent_state"
            responses:
              backend: sql
              namespace: "agents"
              table_name: "responses"
      eval:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          kvstore:
            backend: default
            namespace: "eval"
      safety:
      - provider_id: llama-guard
        provider_type: inline::llama-guard
        config: {}
      files:
      - provider_id: meta-reference-files
        provider_type: inline::localfs
        config:
          metadata_store:
            backend: sql
            namespace: "files"
            table_name: "files_metadata"
          storage_dir: /opt/app-root/src/.llama/distributions/rh/files
      datasetio:
      - provider_id: huggingface
        provider_type: remote::huggingface
        config:
          kvstore:
            backend: default
            namespace: "huggingface"
      - provider_id: localfs
        provider_type: inline::localfs
        config:
          kvstore:
            backend: default
            namespace: "localfs"
      scoring:
      - provider_id: basic
        provider_type: inline::basic
        config: {}
      - provider_id: llm-as-judge
        provider_type: inline::llm-as-judge
        config: {}
      tool_runtime:
      - provider_id: rag-runtime
        provider_type: inline::rag-runtime
        config: {}
      - provider_id: model-context-protocol
        provider_type: remote::model-context-protocol
        config: {}
    metadata_store:
      backend: default
      namespace: "metadata"
    storage:
      backends:
        default:
          type: kv_sqlite
          db_path: /opt/app-root/src/.llama/distributions/rh/storage.db
          namespace: null
        kv_default:
          type: kv_sqlite
          db_path: /opt/app-root/src/.llama/distributions/rh/storage.db
          namespace: null
        sql:
          type: sql_sqlite
          db_path: /opt/app-root/src/.llama/distributions/rh/sql_storage.db
      stores:
        metadata:
          backend: default
          namespace: "llama-stack"
        conversations:
          backend: sql
          namespace: "conversations"
          table_name: "conversations"
        inference:
          backend: sql
          namespace: "inference"
          table_name: "inference"
        prompts:
          backend: kv_default
          namespace: "prompts"
    models:
    - provider_id: sentence-transformers
      model_id: granite-embedding-125m
      provider_model_id: ibm-granite/granite-embedding-125m-english
      model_type: embedding
      metadata:
        embedding_dimension: 768
    shields: []
    vector_dbs: []
    datasets: []
    scoring_fns: []
    benchmarks: []
    tool_groups:
    - toolgroup_id: builtin::rag
      provider_id: rag-runtime
    server:
      port: 8321
---
apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: llama-stack
  namespace: langflow
spec:
  replicas: 1
  server:
    distribution:
      name: rh-dev
    userConfig:
      configMapName: llama-stack-config
    containerSpec:
      command:
        - /bin/sh
        - "-c"
        - llama stack run /etc/llama-stack/config.yaml
      port: 8321
      env:
        - name: VLLM_URL
          value: "http://llama-32-predictor.ai501.svc.cluster.local:8080/v1"
        - name: VLLM_API_TOKEN
          value: "fake"
        - name: VLLM_TLS_VERIFY
          value: "false"
        - name: VLLM_MAX_TOKENS
          value: "4096"
        - name: LLAMA_STACK_CONFIG_DIR
          value: /opt/app-root/src/.llama/distributions/rh
      resources:
        requests:
          cpu: "250m"
          memory: "500Mi"
        limits:
          cpu: "4"
          memory: "12Gi"
---
# NetworkPolicy to allow OpenShift router and langflow namespace pods to reach llama-stack
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llama-stack-allow-ingress
  namespace: langflow
spec:
  podSelector:
    matchLabels:
      app: llama-stack
  ingress:
    - from:
        # Allow OpenShift router (for external route access)
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
        # Allow all pods in the langflow namespace
        - podSelector: {}
      ports:
        - port: 8321
          protocol: TCP
  policyTypes:
    - Ingress
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: llama-stack
  namespace: langflow
  labels:
    app: llama-stack
spec:
  to:
    kind: Service
    name: llama-stack-service
  port:
    targetPort: 8321
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
# =============================================================================
# Qdrant - Vector database (HTTP port 6333, gRPC port 6334)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: langflow
  labels:
    app: qdrant
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: docker.io/qdrant/qdrant:latest
          ports:
            - containerPort: 6333
              protocol: TCP
              name: http
            - containerPort: 6334
              protocol: TCP
              name: grpc
          env:
            - name: QDRANT__STORAGE__STORAGE_PATH
              value: /tmp/qdrant/storage
            - name: QDRANT__STORAGE__SNAPSHOTS_PATH
              value: /tmp/qdrant/snapshots
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: qdrant-data
              mountPath: /tmp/qdrant
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: qdrant-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: langflow
  labels:
    app: qdrant
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
      protocol: TCP
      name: http
    - port: 6334
      targetPort: 6334
      protocol: TCP
      name: grpc
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: qdrant
  namespace: langflow
  labels:
    app: qdrant
spec:
  to:
    kind: Service
    name: qdrant
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  httpHeaders:
    actions:
      response:
        - name: X-Frame-Options
          action:
            type: Delete
        - name: Content-Security-Policy
          action:
            type: Delete
---
# =============================================================================
# n8n - Workflow automation (port 5678)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: langflow
  labels:
    app: n8n
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: nodejs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: docker.io/n8nio/n8n:latest
          ports:
            - containerPort: 5678
              protocol: TCP
          env:
            - name: N8N_PORT
              value: "5678"
            - name: N8N_SECURE_COOKIE
              value: "false"
            - name: N8N_USER_FOLDER
              value: /tmp/n8n
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: n8n-data
              mountPath: /tmp/n8n
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: n8n-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: langflow
  labels:
    app: n8n
spec:
  selector:
    app: n8n
  ports:
    - port: 5678
      targetPort: 5678
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: n8n
  namespace: langflow
  labels:
    app: n8n
spec:
  to:
    kind: Service
    name: n8n
    weight: 100
  port:
    targetPort: 5678
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  httpHeaders:
    actions:
      response:
        - name: X-Frame-Options
          action:
            type: Delete
        - name: Content-Security-Policy
          action:
            type: Delete
---
# =============================================================================
# PostgreSQL - Database (port 5432)
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-data
  namespace: langflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: langflow
  labels:
    app: postgresql
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: postgresql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
              protocol: TCP
              name: postgresql
          env:
            - name: POSTGRESQL_USER
              value: "app_user"
            - name: POSTGRESQL_PASSWORD
              value: "password"
            - name: POSTGRESQL_DATABASE
              value: "appdb"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgresql-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: langflow
  labels:
    app: postgresql
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgresql
---
# =============================================================================
# pgAdmin - PostgreSQL web admin UI (port 5050)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: langflow
  labels:
    app: pgadmin
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      serviceAccountName: pgadmin-sa
      containers:
        - name: pgadmin
          image: docker.io/dpage/pgadmin4:latest
          ports:
            - containerPort: 5050
              protocol: TCP
              name: http
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: "admin@example.com"
            - name: PGADMIN_DEFAULT_PASSWORD
              value: "admin"
            - name: PGADMIN_LISTEN_PORT
              value: "5050"
            - name: PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION
              value: "False"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: pgadmin-data
              mountPath: /var/lib/pgadmin
      volumes:
        - name: pgadmin-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: langflow
  labels:
    app: pgadmin
spec:
  selector:
    app: pgadmin
  ports:
    - port: 5050
      targetPort: 5050
      protocol: TCP
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: pgadmin
  namespace: langflow
  labels:
    app: pgadmin
spec:
  to:
    kind: Service
    name: pgadmin
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  httpHeaders:
    actions:
      response:
        - name: X-Frame-Options
          action:
            type: Delete
        - name: Content-Security-Policy
          action:
            type: Delete
---
# =============================================================================
# PostgREST - RESTful API for PostgreSQL (port 3000)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  namespace: langflow
  labels:
    app: postgrest
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: golang
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
    spec:
      containers:
        - name: postgrest
          image: docker.io/postgrest/postgrest:latest
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          env:
            - name: PGRST_DB_URI
              value: "postgres://app_user:password@postgresql.langflow.svc:5432/appdb"
            - name: PGRST_DB_ANON_ROLE
              value: "app_user"
            - name: PGRST_DB_SCHEMAS
              value: "public"
            - name: PGRST_SERVER_PORT
              value: "3000"
            - name: PGRST_OPENAPI_MODE
              value: "follow-privileges"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgrest
  namespace: langflow
  labels:
    app: postgrest
spec:
  selector:
    app: postgrest
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: postgrest
  namespace: langflow
  labels:
    app: postgrest
spec:
  to:
    kind: Service
    name: postgrest
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
