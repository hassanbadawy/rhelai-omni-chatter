# =============================================================================
# vLLM GPU ServingRuntime for OpenShift AI (RHOAI)
# =============================================================================
# Generic CUDA runtime for any HuggingFace model on NVIDIA GPU.
# Deploy once per namespace, then create InferenceServices that reference it.
#
# Apply: oc apply -f vllm-gpu-servingruntime.yaml -n <namespace>
#
# When creating an InferenceService, use a hardware profile with GPU or set:
#   resources:
#     requests:
#       nvidia.com/gpu: "1"
#     limits:
#       nvidia.com/gpu: "1"
# =============================================================================
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/accelerator-name: "nvidia.com/gpu"
    opendatahub.io/apiProtocol: REST
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/template-display-name: vLLM GPU Generic Runtime
    opendatahub.io/template-name: vllm-gpu-generic
    openshift.io/display-name: vLLM GPU Generic Runtime
  labels:
    opendatahub.io/dashboard: "true"
  name: vllm-gpu-generic
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  builtInAdapter:
    modelLoadingTimeoutMillis: 300000
  containers:
    - args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
        - --trust-remote-code
        - --max-model-len=4096
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:ec799bb5eeb7e25b4b25a8917ab5161da6b6f1ab830cbba61bba371cffb0c34d
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM
