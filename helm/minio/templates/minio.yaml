apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage }}
  volumeMode: Filesystem
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
stringData:
  minio_root_user: {{ .Values.rootUser }}
  minio_root_password: {{ .Values.rootPassword }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  labels:
    app: minio
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.image }}
          args:
            - server
            - /data
            - --console-address
            - :{{ .Values.consolePort }}
          ports:
            - containerPort: {{ .Values.apiPort }}
              protocol: TCP
              name: api
            - containerPort: {{ .Values.consolePort }}
              protocol: TCP
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: minio_root_user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: minio_root_password
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
              subPath: minio
          readinessProbe:
            tcpSocket:
              port: {{ .Values.apiPort }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.apiPort }}
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  labels:
    app: minio
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: api
      port: {{ .Values.apiPort }}
      targetPort: {{ .Values.apiPort }}
      protocol: TCP
    - name: console
      port: {{ .Values.consolePort }}
      targetPort: {{ .Values.consolePort }}
      protocol: TCP
{{- if .Values.route.api.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio-api
  labels:
    app: minio
spec:
  to:
    kind: Service
    name: minio-service
    weight: 100
  port:
    targetPort: api
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
{{- if .Values.route.console.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio-ui
  labels:
    app: minio
spec:
  to:
    kind: Service
    name: minio-service
    weight: 100
  port:
    targetPort: console
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
