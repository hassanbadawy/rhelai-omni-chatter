apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langflow-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langflow
  labels:
    app: langflow
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: python
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: langflow
  template:
    metadata:
      labels:
        app: langflow
    spec:
      containers:
        - name: langflow
          image: {{ .Values.image }}
          ports:
            - containerPort: 7860
              name: http
          env:
            - name: LANGFLOW_HOST
              value: "0.0.0.0"
            - name: LANGFLOW_PORT
              value: "7860"
            - name: HOME
              value: "/app/data"
            - name: LANGFLOW_CONFIG_DIR
              value: "/app/data/.langflow"
            - name: LANGFLOW_DATABASE_URL
              value: "sqlite:////app/data/langflow.db"
            - name: LANGFLOW_ALEMBIC_LOG_FILE
              value: "/app/data/alembic.log"
            - name: LANGFLOW_AUTO_LOGIN
              value: {{ .Values.autoLogin | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /.cache
          startupProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 7860
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langflow-data
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: langflow
  labels:
    app: langflow
spec:
  type: ClusterIP
  selector:
    app: langflow
  ports:
    - port: 7860
      targetPort: 7860
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: langflow
  labels:
    app: langflow
spec:
  to:
    kind: Service
    name: langflow
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
