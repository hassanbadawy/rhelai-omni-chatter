{{- if .Values.swaggerUI.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swagger-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: swagger-ui
    {{- include "langflow-stack.labels" . | nindent 4 }}
    app.openshift.io/runtime: nodejs
spec:
  replicas: {{ .Values.swaggerUI.replicas }}
  selector:
    matchLabels:
      app: swagger-ui
  template:
    metadata:
      labels:
        app: swagger-ui
    spec:
      containers:
        - name: swagger-ui
          image: {{ .Values.swaggerUI.image }}
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          env:
            - name: API_URL
              value: "https://postgrest-{{ .Release.Namespace }}.apps.{{ .Values.clusterDomain }}/"
          resources:
            {{- toYaml .Values.swaggerUI.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: swagger-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: swagger-ui
spec:
  selector:
    app: swagger-ui
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: swagger-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: swagger-ui
spec:
  to:
    kind: Service
    name: swagger-ui
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  httpHeaders:
    actions:
      response:
        - name: X-Frame-Options
          action:
            type: Delete
        - name: Content-Security-Policy
          action:
            type: Delete
{{- end }}
