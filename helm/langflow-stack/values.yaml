clusterDomain: cluster-5t99k.5t99k.sandbox1248.opentlc.com

# -- Langflow
langflow:
  enabled: true
  image: langflowai/langflow:latest
  replicas: 1
  storage: 1Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  env:
    autoLogin: "true"

# -- Llama Stack (operator-managed via LlamaStackDistribution CR)
llamaStack:
  enabled: true
  distribution: rh-dev
  replicas: 1
  port: 8321
  vllm:
    url: "http://llama-32-predictor.ai501.svc.cluster.local:8080/v1"
    apiToken: "fake"
    tlsVerify: "false"
    maxTokens: "4096"
  configDir: /opt/app-root/src/.llama/distributions/rh
  resources:
    requests:
      cpu: "250m"
      memory: "500Mi"
    limits:
      cpu: "4"
      memory: "12Gi"
  embedding:
    modelId: granite-embedding-125m
    providerModelId: ibm-granite/granite-embedding-125m-english
    dimension: 768

# -- Qdrant vector database
qdrant:
  enabled: true
  image: docker.io/qdrant/qdrant:latest
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# -- n8n workflow automation
n8n:
  enabled: true
  image: docker.io/n8nio/n8n:latest
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# -- PostgreSQL database
postgresql:
  enabled: true
  image: registry.redhat.io/rhel9/postgresql-16:latest
  replicas: 1
  storage: 5Gi
  user: app_user
  password: password
  database: appdb
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- pgAdmin web UI
pgadmin:
  enabled: true
  image: docker.io/dpage/pgadmin4:latest
  replicas: 1
  email: "admin@example.com"
  password: "admin"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# -- PostgREST RESTful API for PostgreSQL
postgrest:
  enabled: true
  image: docker.io/postgrest/postgrest:latest
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Swagger UI for PostgREST API docs
swaggerUI:
  enabled: true
  image: docker.io/swaggerapi/swagger-ui:latest
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -- Dashy dashboard
dashy:
  enabled: true
  image: docker.io/lissy93/dashy:latest
  replicas: 1
  theme: lissy
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
