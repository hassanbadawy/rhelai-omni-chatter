distribution: rh-dev

# -- Custom image with trusty_fms safety provider (guardrails support)
image: "quay.io/rhoai-genaiops/llama-stack-vllm-milvus-fms:rhoai-3.0-fix3"
replicas: 1
port: 8321

vllm:
  url: "http://tinyllamatinyllama-11b-chat-v06-predictor.genai-demo.svc.cluster.local:8080/v1"
  apiToken: "fake"
  tlsVerify: "false"
  maxTokens: "4096"

configDir: /opt/app-root/src/.llama/distributions/rh

route:
  enabled: true

resources:
  requests:
    cpu: "250m"
    memory: "500Mi"
  limits:
    cpu: "4"
    memory: "12Gi"

embedding:
  modelId: granite-embedding-125m
  providerModelId: ibm-granite/granite-embedding-125m-english
  dimension: 768

# -- Guardrails (requires guardrails-orchestrator deployed in same namespace)
guardrails:
  enabled: false
  orchestratorUrl: "https://guardrails-orchestrator:8080"
  regex:
    enabled: false
    filter: ["(?i).*fight club.*"]
  hap:
    enabled: false
  prompt_injection:
    enabled: false
  language_detection:
    enabled: false

# -- Milvus vector database
# mode: "inline" (embedded, no external service needed)
#       "remote" (connect to a standalone Milvus instance)
milvus:
  mode: "inline"
  # Remote Milvus settings (only used when mode is "remote")
  endpoint: "http://milvus.genai-demo.svc:19530"
  token: ""
