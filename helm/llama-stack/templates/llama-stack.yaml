apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-stack-config
  labels:
    llamastack.io/distribution: llama-stack
    opendatahub.io/dashboard: "true"
data:
  config.yaml: |
{{- if .Values.guardrails.enabled }}
    version: '2'
    image_name: vllm
    apis:
    - agents
    - datasetio
    - eval
    - files
    - inference
    - safety
    - shields
    - scoring
    - tool_runtime
    - vector_io
    providers:
      safety:
      - provider_id: trusty_fms
        provider_type: remote::trusty_fms
        config:
          orchestrator_url: {{ .Values.guardrails.orchestratorUrl }}
          verify_ssl: false
          {{- if or .Values.guardrails.regex.enabled .Values.guardrails.hap.enabled .Values.guardrails.prompt_injection.enabled .Values.guardrails.language_detection.enabled }}
          shields:
            {{- if .Values.guardrails.regex.enabled }}
            regex:
              detectors:
                regex_competitor:
                  detector_params:
                    regex: [{{- range $i, $f := .Values.guardrails.regex.filter }}{{ if $i }}, {{ end }}{{ $f | quote }}{{- end }}]
              type: content
              confidence_threshold: 0.5
              message_types: ["user", "system", "completion"]
            {{- end }}
            {{- if .Values.guardrails.hap.enabled }}
            hap:
              type: content
              confidence_threshold: 0.5
              message_types: ["user", "system", "completion"]
              detectors:
                hap:
                  detector_params: {}
            {{- end }}
            {{- if .Values.guardrails.language_detection.enabled }}
            language_detection:
              type: content
              confidence_threshold: 0.5
              message_types: ["user", "system", "completion"]
              detectors:
                language_detection:
                  detector_params: {}
            {{- end }}
            {{- if .Values.guardrails.prompt_injection.enabled }}
            prompt_injection:
              type: content
              confidence_threshold: 0.5
              message_types: ["user", "system", "completion"]
              detectors:
                prompt_injection:
                  detector_params: {}
            {{- end }}
          {{- end }}
      inference:
      - provider_id: sentence-transformers
        provider_type: inline::sentence-transformers
        config: {}
      - provider_id: vllm
        provider_type: remote::vllm
        config:
          url: {{ .Values.vllm.url }}
          {{- if .Values.vllm.apiToken }}
          api_token: {{ .Values.vllm.apiToken }}
          {{- end }}
      agents:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          persistence_store:
            type: sqlite
            db_path: /opt/app-root/src/.llama/distributions/rh/agents_store.db
          responses_store:
            type: sqlite
            db_path: /opt/app-root/src/.llama/distributions/rh/responses_store.db
      eval:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          kvstore:
            type: sqlite
            namespace: null
            db_path: /opt/app-root/src/.llama/distributions/rh/eval_store.db
      datasetio:
      - provider_id: huggingface
        provider_type: remote::huggingface
        config:
          kvstore:
            type: sqlite
            namespace: null
            db_path: /opt/app-root/src/.llama/distributions/rh/huggingface_datasetio.db
      files:
      - provider_id: local-files
        provider_type: inline::localfs
        config:
          storage_dir: /opt/app-root/src/.llama/distributions/rh/files
          create_if_missing: true
          metadata_store:
            type: sqlite
            db_path: /opt/app-root/src/.llama/distributions/rh/files_metadata.db
      scoring:
      - provider_id: basic
        provider_type: inline::basic
        config: {}
      - provider_id: llm-as-judge
        provider_type: inline::llm-as-judge
        config: {}
      tool_runtime:
      - provider_id: rag-runtime
        provider_type: inline::rag-runtime
        config: {}
      - provider_id: model-context-protocol
        provider_type: remote::model-context-protocol
        config: {}
      vector_io:
      - provider_id: milvus
        {{- if eq .Values.milvus.mode "remote" }}
        provider_type: remote::milvus
        config:
          uri: {{ .Values.milvus.endpoint }}
          token: {{ .Values.milvus.token | default "root:Milvus" | quote }}
          kvstore:
            type: sqlite
            db_path: ${env.SQLITE_STORE_DIR:={{ .Values.configDir }}}/milvus_registry.db
        {{- else }}
        provider_type: inline::milvus
        config:
          db_path: ${env.MILVUS_DB_PATH:={{ .Values.configDir }}}/milvus.db
          kvstore:
            type: sqlite
            db_path: ${env.SQLITE_STORE_DIR:={{ .Values.configDir }}}/milvus_registry.db
        {{- end }}
    models:
    - provider_id: sentence-transformers
      model_id: {{ .Values.embedding.modelId }}
      provider_model_id: {{ .Values.embedding.providerModelId }}
      model_type: embedding
      metadata:
        embedding_dimension: {{ .Values.embedding.dimension }}
    external_providers_dir: /opt/app-root/src/.llama/providers.d/
    shields:
    {{- if .Values.guardrails.regex.enabled }}
    - shield_id: regex
      provider_id: trusty_fms
    {{- end }}
    {{- if .Values.guardrails.hap.enabled }}
    - shield_id: hap
      provider_id: trusty_fms
    {{- end }}
    {{- if .Values.guardrails.prompt_injection.enabled }}
    - shield_id: prompt_injection
      provider_id: trusty_fms
    {{- end }}
    {{- if .Values.guardrails.language_detection.enabled }}
    - shield_id: language_detection
      provider_id: trusty_fms
    {{- end }}
    tool_groups:
    - toolgroup_id: builtin::rag
      provider_id: rag-runtime
    server:
      port: {{ .Values.port }}
{{- else }}
    version: "2"
    image_name: rh
    apis:
    - agents
    - datasetio
    - eval
    - files
    - inference
    - safety
    - scoring
    - tool_runtime
    - vector_io
    providers:
      inference:
      - provider_id: sentence-transformers
        provider_type: inline::sentence-transformers
        config:
          trust_remote_code: true
      - provider_id: vllm
        provider_type: remote::vllm
        config:
          base_url: {{ .Values.vllm.url }}
          api_token: {{ .Values.vllm.apiToken }}
          tls_verify: {{ .Values.vllm.tlsVerify }}
          max_tokens: {{ .Values.vllm.maxTokens }}
      vector_io:
      - provider_id: milvus
        {{- if eq .Values.milvus.mode "remote" }}
        provider_type: remote::milvus
        config:
          uri: {{ .Values.milvus.endpoint }}
          token: {{ .Values.milvus.token | default "root:Milvus" | quote }}
          kvstore:
            backend: default
            namespace: "milvus"
        {{- else }}
        provider_type: inline::milvus
        config:
          db_path: {{ .Values.configDir }}/milvus.db
          kvstore:
            backend: default
            namespace: "milvus"
          persistence:
            backend: default
            namespace: "milvus_persistence"
        {{- end }}
      agents:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          persistence:
            agent_state:
              backend: default
              namespace: "agent_state"
            responses:
              backend: sql
              namespace: "agents"
              table_name: "responses"
      eval:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          kvstore:
            backend: default
            namespace: "eval"
      safety:
      - provider_id: llama-guard
        provider_type: inline::llama-guard
        config: {}
      files:
      - provider_id: meta-reference-files
        provider_type: inline::localfs
        config:
          metadata_store:
            backend: sql
            namespace: "files"
            table_name: "files_metadata"
          storage_dir: {{ .Values.configDir }}/files
      datasetio:
      - provider_id: huggingface
        provider_type: remote::huggingface
        config:
          kvstore:
            backend: default
            namespace: "huggingface"
      - provider_id: localfs
        provider_type: inline::localfs
        config:
          kvstore:
            backend: default
            namespace: "localfs"
      scoring:
      - provider_id: basic
        provider_type: inline::basic
        config: {}
      - provider_id: llm-as-judge
        provider_type: inline::llm-as-judge
        config: {}
      tool_runtime:
      - provider_id: rag-runtime
        provider_type: inline::rag-runtime
        config: {}
      - provider_id: model-context-protocol
        provider_type: remote::model-context-protocol
        config: {}
    metadata_store:
      backend: default
      namespace: "metadata"
    storage:
      backends:
        default:
          type: kv_sqlite
          db_path: {{ .Values.configDir }}/storage.db
          namespace: null
        kv_default:
          type: kv_sqlite
          db_path: {{ .Values.configDir }}/storage.db
          namespace: null
        sql:
          type: sql_sqlite
          db_path: {{ .Values.configDir }}/sql_storage.db
      stores:
        metadata:
          backend: default
          namespace: "llama-stack"
        conversations:
          backend: sql
          namespace: "conversations"
          table_name: "conversations"
        inference:
          backend: sql
          namespace: "inference"
          table_name: "inference"
        prompts:
          backend: kv_default
          namespace: "prompts"
    models:
    - provider_id: sentence-transformers
      model_id: {{ .Values.embedding.modelId }}
      provider_model_id: {{ .Values.embedding.providerModelId }}
      model_type: embedding
      metadata:
        embedding_dimension: {{ .Values.embedding.dimension }}
    shields: []
    vector_dbs: []
    datasets: []
    scoring_fns: []
    benchmarks: []
    tool_groups:
    - toolgroup_id: builtin::rag
      provider_id: rag-runtime
    server:
      port: {{ .Values.port }}
{{- end }}
---
apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: llama-stack
spec:
  replicas: {{ .Values.replicas }}
  server:
    distribution:
      {{- if and .Values.guardrails.enabled .Values.image }}
      image: {{ .Values.image | quote }}
      {{- else }}
      name: {{ .Values.distribution }}
      {{- end }}
    userConfig:
      configMapName: llama-stack-config
    containerSpec:
      command:
        - /bin/sh
        - "-c"
        - llama stack run /etc/llama-stack/config.yaml
      port: {{ .Values.port }}
      env:
        - name: VLLM_URL
          value: {{ .Values.vllm.url | quote }}
        - name: VLLM_API_TOKEN
          value: {{ .Values.vllm.apiToken | quote }}
        - name: VLLM_TLS_VERIFY
          value: {{ .Values.vllm.tlsVerify | quote }}
        - name: VLLM_MAX_TOKENS
          value: {{ .Values.vllm.maxTokens | quote }}
        - name: LLAMA_STACK_CONFIG_DIR
          value: {{ .Values.configDir }}
        {{- if .Values.guardrails.enabled }}
        - name: FMS_VERIFY_SSL
          value: "false"
        - name: MILVUS_DB_PATH
          value: /opt/app-root/src/.llama/distributions/rh
        - name: SQLITE_STORE_DIR
          value: /opt/app-root/src/.llama/distributions/rh
        {{- end }}
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llama-stack-allow-ingress
spec:
  podSelector:
    matchLabels:
      app: llama-stack
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
        - podSelector: {}
      ports:
        - port: {{ .Values.port }}
          protocol: TCP
  policyTypes:
    - Ingress
{{- if .Values.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: llama-stack
  labels:
    app: llama-stack
spec:
  to:
    kind: Service
    name: llama-stack-service
  port:
    targetPort: {{ .Values.port }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
