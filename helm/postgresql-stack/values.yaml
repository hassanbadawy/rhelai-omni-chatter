clusterDomain: cluster-5t99k.5t99k.sandbox1248.opentlc.com

# -- PostgreSQL
postgresql:
  image: registry.redhat.io/rhel9/postgresql-16:latest
  port: 5432
  storage: 5Gi
  user: app_user
  password: password
  database: appdb
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# -- pgAdmin
pgadmin:
  enabled: true
  image: docker.io/dpage/pgadmin4:latest
  port: 5050
  email: "admin@example.com"
  password: "admin"
  route:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# -- PostgREST
postgrest:
  enabled: true
  image: docker.io/postgrest/postgrest:latest
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Swagger UI
swaggerUI:
  enabled: true
  image: docker.io/swaggerapi/swagger-ui:latest
  port: 8080
  route:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
