{{- if .Values.swaggerUI.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swagger-ui
  labels:
    app: swagger-ui
    app.kubernetes.io/part-of: postgresql-stack
    app.openshift.io/runtime: nodejs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swagger-ui
  template:
    metadata:
      labels:
        app: swagger-ui
    spec:
      containers:
        - name: swagger-ui
          image: {{ .Values.swaggerUI.image }}
          ports:
            - containerPort: {{ .Values.swaggerUI.port }}
              protocol: TCP
              name: http
          env:
            - name: API_URL
              value: "http://postgrest.{{ .Release.Namespace }}.svc:{{ .Values.postgrest.port }}/"
          resources:
            {{- toYaml .Values.swaggerUI.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: swagger-ui
  labels:
    app: swagger-ui
spec:
  selector:
    app: swagger-ui
  ports:
    - port: {{ .Values.swaggerUI.port }}
      targetPort: {{ .Values.swaggerUI.port }}
      protocol: TCP
      name: http
{{- if .Values.swaggerUI.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: swagger-ui
  labels:
    app: swagger-ui
spec:
  to:
    kind: Service
    name: swagger-ui
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  httpHeaders:
    actions:
      response:
        - name: X-Frame-Options
          action:
            type: Delete
        - name: Content-Security-Policy
          action:
            type: Delete
{{- end }}
{{- end }}
