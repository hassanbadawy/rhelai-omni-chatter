{{- if .Values.pgadmin.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pgadmin-sa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  labels:
    app: pgadmin
    app.kubernetes.io/part-of: postgresql-stack
    app.openshift.io/runtime: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      serviceAccountName: pgadmin-sa
      containers:
        - name: pgadmin
          image: {{ .Values.pgadmin.image }}
          ports:
            - containerPort: {{ .Values.pgadmin.port }}
              protocol: TCP
              name: http
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: {{ .Values.pgadmin.email | quote }}
            - name: PGADMIN_DEFAULT_PASSWORD
              value: {{ .Values.pgadmin.password | quote }}
            - name: PGADMIN_LISTEN_PORT
              value: {{ .Values.pgadmin.port | quote }}
            - name: PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION
              value: "False"
          resources:
            {{- toYaml .Values.pgadmin.resources | nindent 12 }}
          volumeMounts:
            - name: pgadmin-data
              mountPath: /var/lib/pgadmin
      volumes:
        - name: pgadmin-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  labels:
    app: pgadmin
spec:
  selector:
    app: pgadmin
  ports:
    - port: {{ .Values.pgadmin.port }}
      targetPort: {{ .Values.pgadmin.port }}
      protocol: TCP
      name: http
{{- if .Values.pgadmin.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: pgadmin
  labels:
    app: pgadmin
spec:
  to:
    kind: Service
    name: pgadmin
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  httpHeaders:
    actions:
      response:
        - name: X-Frame-Options
          action:
            type: Delete
        - name: Content-Security-Policy
          action:
            type: Delete
{{- end }}
{{- end }}
