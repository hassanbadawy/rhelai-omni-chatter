apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  labels:
    app: postgrest
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: golang
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
    spec:
      containers:
        - name: postgrest
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.port }}
              protocol: TCP
              name: http
          env:
            - name: PGRST_DB_URI
              value: "postgres://{{ .Values.postgresql.user }}:{{ .Values.postgresql.password }}@{{ .Values.postgresql.host }}.{{ .Release.Namespace }}.svc:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
            - name: PGRST_DB_ANON_ROLE
              value: {{ .Values.postgresql.user | quote }}
            - name: PGRST_DB_SCHEMAS
              value: "public"
            - name: PGRST_SERVER_PORT
              value: {{ .Values.port | quote }}
            - name: PGRST_OPENAPI_MODE
              value: "follow-privileges"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgrest
  labels:
    app: postgrest
spec:
  selector:
    app: postgrest
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: http
{{- if .Values.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: postgrest
  labels:
    app: postgrest
spec:
  to:
    kind: Service
    name: postgrest
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
