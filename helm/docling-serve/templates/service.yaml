apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-predictor
  labels:
    app: {{ .Release.Name }}-predictor
    component: predictor
  annotations:
    openshift.io/display-name: Docling Serve
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-predictor
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.server.port }}
