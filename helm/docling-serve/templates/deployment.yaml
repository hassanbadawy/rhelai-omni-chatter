apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-predictor
  labels:
    app: {{ .Release.Name }}-predictor
    component: predictor
  annotations:
    openshift.io/display-name: Docling Serve
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-predictor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-predictor
        component: predictor
        opendatahub.io/dashboard: "true"
      annotations:
        openshift.io/display-name: Docling Serve
    spec:
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize }}
      containers:
        - name: kserve-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - "-m"
            - docling_serve
            - run
          env:
            - name: UVICORN_WORKERS
              value: {{ .Values.server.workers | quote }}
            - name: WITH_UI
              value: {{ .Values.server.enableUI | quote | replace "true" "True" | replace "false" "False" }}
          ports:
            - containerPort: {{ .Values.server.port }}
              protocol: TCP
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory }}
              {{- if .Values.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.gpu.count | quote }}
              {{- end }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory }}
              {{- if .Values.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.gpu.count | quote }}
              {{- end }}
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          readinessProbe:
            tcpSocket:
              port: {{ .Values.server.port }}
            periodSeconds: 10
            failureThreshold: 3
      {{- if .Values.gpu.enabled }}
      tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Equal
          value: {{ .Values.gpu.tolerationValue }}
      {{- end }}
