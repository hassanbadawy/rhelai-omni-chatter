apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  labels:
    app: qdrant
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: qdrant
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.image }}
          ports:
            - containerPort: 6333
              protocol: TCP
              name: http
            - containerPort: 6334
              protocol: TCP
              name: grpc
          env:
            - name: QDRANT__STORAGE__STORAGE_PATH
              value: /tmp/qdrant/storage
            - name: QDRANT__STORAGE__SNAPSHOTS_PATH
              value: /tmp/qdrant/snapshots
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: qdrant-data
              mountPath: /tmp/qdrant
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: qdrant-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  labels:
    app: qdrant
spec:
  selector:
    app: qdrant
  ports:
    - port: 6333
      targetPort: 6333
      protocol: TCP
      name: http
    - port: 6334
      targetPort: 6334
      protocol: TCP
      name: grpc
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: qdrant
  labels:
    app: qdrant
spec:
  to:
    kind: Service
    name: qdrant
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  httpHeaders:
    actions:
      response:
        - name: X-Frame-Options
          action:
            type: Delete
        - name: Content-Security-Policy
          action:
            type: Delete
