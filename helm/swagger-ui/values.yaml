image: docker.io/swaggerapi/swagger-ui:latest
replicas: 1
port: 8080

# URL of the PostgREST (or any OpenAPI) endpoint to visualize
apiUrl: "https://postgrest-langflow.apps.example.com/"

route:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
