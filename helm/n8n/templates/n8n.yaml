apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  labels:
    app: n8n
    app.kubernetes.io/part-of: langflow-stack
    app.openshift.io/runtime: nodejs
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            - name: N8N_PORT
              value: {{ .Values.port | quote }}
            - name: N8N_SECURE_COOKIE
              value: "false"
            - name: N8N_USER_FOLDER
              value: /tmp/n8n
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: n8n-data
              mountPath: /tmp/n8n
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: n8n-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  labels:
    app: n8n
spec:
  selector:
    app: n8n
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
{{- if .Values.route.enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: n8n
  labels:
    app: n8n
spec:
  to:
    kind: Service
    name: n8n
    weight: 100
  port:
    targetPort: {{ .Values.port }}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  httpHeaders:
    actions:
      response:
        - name: X-Frame-Options
          action:
            type: Delete
        - name: Content-Security-Policy
          action:
            type: Delete
{{- end }}
